server:
  port: ${PORT:8081}
spring:
  application:
    name: legal-platform
  datasource:
    url: ${DATABASE_URL:jdbc:sqlite:./legalplatform.db}
    username: ${DB_USERNAME:}
    password: ${DB_PASSWORD:}
    driver-class-name: ${DB_DRIVER:org.sqlite.JDBC}
  jpa:
    hibernate:
      ddl-auto: update
    database-platform: ${DB_DIALECT:org.hibernate.community.dialect.SQLiteDialect}
    show-sql: false
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 10MB
jwt:
  secret: ${JWT_SECRET:your-super-secret-jwt-key-change-this-in-production}
  expiration: 86400000
n8n:
  webhook:
    send-otp: ${N8N_SEND_OTP_WEBHOOK:https://n8n-production-1a2d2.up.railway.app/webhook/send-otp}
    verify-otp: ${N8N_VERIFY_OTP_WEBHOOK:https://n8n-production-1a2d2.up.railway.app/webhook/verify-otp}
google:
  calendar:
    id: ${GOOGLE_CALENDAR_ID:kapoorandassociatesadv@gmail.com}
    service-account-email: ${GOOGLE_SERVICE_ACCOUNT_EMAIL:not-configured}
    service-account-key-path: ${GOOGLE_SERVICE_ACCOUNT_KEY_PATH:not-configured}
app:
  upload-dir: ./uploads
