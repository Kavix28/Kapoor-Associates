server:
  port: ${PORT:8080}
spring:
  application:
    name: legal-platform
  datasource:
    url: ${DATABASE_URL:jdbc:sqlite:./legalplatform.db}
    username: ${DB_USERNAME:}
    password: ${DB_PASSWORD:}
    driver-class-name: ${DB_DRIVER:org.sqlite.JDBC}
  jpa:
    hibernate:
      ddl-auto: update
    database-platform: ${DB_DIALECT:org.hibernate.community.dialect.SQLiteDialect}
    show-sql: false
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 10MB
jwt:
  secret: ${JWT_SECRET:your-super-secret-jwt-key-change-this-in-production}
  expiration: 86400000
mail:
  host: smtp.gmail.com
  port: 587
  username: ${EMAIL_USER:kapoorandassociatesadv@gmail.com}
  password: ${EMAIL_PASS:your-gmail-app-password}
  properties:
    mail:
      smtp:
        auth: true
        starttls:
          enable: true
google:
  calendar:
    id: ${GOOGLE_CALENDAR_ID:kapoorandassociatesadv@gmail.com}
    service-account-email: ${GOOGLE_SERVICE_ACCOUNT_EMAIL:not-configured}
    service-account-key-path: ${GOOGLE_SERVICE_ACCOUNT_KEY_PATH:not-configured}
app:
  upload-dir: ./uploads
